<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dijital Kartvizit | Kemal ALPİNANÇ</title>
    <style>
        :root {
            --primary-color: #2c3e50; /* Üst bandın rengi */
            --accent-color: #d4a373;  /* Katalog butonu rengi */
            --bg-color: #f4f7f6;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: #fff;
            width: 100%;
            max-width: 360px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            position: relative;
            overflow: hidden;
            padding-bottom: 30px;
        }

        /* Üstteki Koyu Bant */
        .card-header {
            background: var(--primary-color);
            height: 120px;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
        }

        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 5px solid #fff;
            position: relative;
            z-index: 1;
            margin-top: 45px;
            object-fit: cover;
            background: #fff;
        }

        .logo {
            width: 120px;
            margin: 15px auto;
            display: block;
        }

        h1 {
            font-size: 24px;
            color: var(--primary-color);
            margin: 10px 0 25px 0;
            font-weight: bold;
        }

        /* Buton Stilleri */
        .btn-container {
            padding: 0 30px;
        }

        .btn {
            display: block;
            padding: 16px;
            margin-bottom: 12px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .btn-katalog { 
            background-color: #d4a373; 
            color: #ffffff; 
            border: 1px solid #d4a373; 
        }
        .btn-katalog:hover { 
            background-color: #bc8a5f; 
            transform: translateY(-2px); 
        }

        .btn-web { 
            background-color: #1a1a1a; 
            color: #ffffff; 
            border: 1px solid #1a1a1a; 
        }
        .btn-web:hover { 
            background-color: #333333; 
            transform: translateY(-2px); 
        }

        /* SSS BUTONU - YENİ EKLENDİ */
        .btn-sss { 
            border: 2px solid #CD212A; 
            color: #CD212A; 
            background: transparent; 
        }
        .btn-sss:hover { 
            background-color: #CD212A; 
            color: #ffffff; 
            transform: translateY(-2px); 
        }

        .btn-call { 
            border: 2px solid #1a1a1a; 
            color: #1a1a1a; 
            background: transparent; 
        }
        .btn-call:hover { 
            background-color: #1a1a1a; 
            color: #ffffff; 
            transform: translateY(-2px); 
        }

        .footer {
            font-size: 10px;
            color: #bbbbbb;
            margin-top: 20px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="card-header"></div>
        
        <img src="profil.png" alt="Kemal ALPİNANÇ" class="profile-img">
        
        <img src="logo.png" alt="Renazzo Logo" class="logo">

        <h1>Kemal ALPİNANÇ</h1>

        <div class="btn-container">
            <a href="https://heyzine.com/flip-book/bf0904a9ae.html" target="_blank" class="btn btn-katalog">KATALOĞU İNCELE</a>
            <a href="https://www.renazzomobilya.com" target="_blank" class="btn btn-web">WEB SİTEMİZ</a>
            
            <a href="sss.html" class="btn btn-sss">SIKÇA SORULAN SORULAR</a>
            
            <a href="tel:+905327184610" class="btn btn-call">BENİ DOĞRUDAN ARA</a>
        </div>

        <div class="footer">RENAZZO MOBİLYA &copy; 2026</div>
    </div>

</body>
</html>
